services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: career_os
      POSTGRES_USER: career
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-career_dev}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: .
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    command: uvicorn career_os.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    command: python -m career_os.agents.orchestrator worker

volumes:
  pgdata:
